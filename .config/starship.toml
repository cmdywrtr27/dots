format = """
$status\
${custom.icon}\
[î‚°](bg:#2e3440 fg:#6d597a)\
[î‚°](bg:#3d5a80 fg:#2e3440)\
$directory\
[î‚°](bg:#2e3440 fg:#3d5a80)\
[î‚°](bg:#f4a259 fg:#2e3440)\
$time\
[î‚°](bg:#2e3440 fg:#f4a259)\
[î‚°](bg:#5b8e7d fg:#2e3440)\
$cmd_duration\
[î‚°](bg:#2e3440 fg:#5b8e7d)\
[î‚°](bg:#bc4b51 fg:#2e3440)\
$git_branch\
$git_status\
[î‚° ](fg:#bc4b51)\
"""
command_timeout = 5000
[status]
style = "fg:#ffffff bg:#6d597a"
symbol = "ïگ،"
success_symbol = ""
format = '[ $symbol ]($style)'
map_symbol = false
disabled = false

[username]
show_always = false
style_user = "bg:#6d597a"
style_root = "bg:#6d597a"
format = '[$user]($style)'

[hostname]
ssh_only = false
format = "[@$hostname ](bg:#6d597a)"
trim_at = "."
disabled = true

[custom.arch]
description = "Display arch logo"
when = "true"
style = "fg:#ffffff bg:#6d597a"
format = '[$symbol(bg:#6d597a)]($style) '
symbol = "ïŒƒ "

[custom.icon]
description = "Display icon for each home folder"
command = """
if [ "$PWD" = "$HOME" ]; then
    echo "َ°‹œ "
elif [ "$PWD" = "$HOME/Documents" ]; then
    echo "ïœک "
elif [ "$PWD" = "$HOME/Downloads" ]; then
    echo "َ°‍’ "
elif [ "$PWD" = "$HOME/Music" ]; then
    echo "ï€پ "
elif [ "$PWD" = "$HOME/Pictures" ]; then
    echo "ï€¾ "
elif [ "$PWD" = "$HOME/Videos" ]; then
    echo "ï«‚"
elif [ "$PWD" = "$HOME/.local/bin" ]; then
    echo "ï„، "
else
    echo "ï±® "
fi
"""
when = "true"
style = "fg:#ffffff bg:#6d597a"
format = '[ $output ]($style)'

[directory]
style = "fg:#ffffff bg:#3d5a80"
format = '[ $path ]($style)'
truncation_length = 2
truncation_symbol = "~/"

[git_branch]
symbol = "ïگˆ "
style = "fg:#ffffff bg:#bc4b51"
format = '[ $symbol $branch]($style)'

[git_status]
style = "fg:#ffffff bg:#bc4b51"
format = '[ ($all_status) ]($style)'

[custom.docker]
description = "Shows the docker symbol if the current directory has Dockerfile or docker-compose.yml files"
style = "bg:#86BBD8"
format = '[$symbol]($style)'
symbol = " ًںگ³ "
files = ["Dockerfile", "docker-compose.yml", "docker-compose.yaml"]
when = """ command -v docker &> /dev/null; exit (echo $?); """
disabled = true

[cmd_duration]
min_time = 500
style = "fg:#ffffff bg:#5b8e7d"
format = "[ َ°”› $duration ]($style)"
disabled = true

[time]
disabled = true
time_format = "%l:%M %P"
style = "fg:#ffffff bg:#f4a259"
format = '[ ïگ؛$time ]($style)'

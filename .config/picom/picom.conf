# Animations

animations = true;
animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-menu-window = "slide-down";
animation-for-transient-window = "slide-down";
animation-stiffness = 380;
animation-dampening = 24;
animation-window-mass = 1;
animation-clamping = true;
animation-delta = 10;

transition-length = 300;
transition-pow-x = 0.99;
transition-pow-y = 0.99;
transition-pow-w = 0.99;
transition-pow-h = 0.99;
size-transition = true;

# Shadows

shadow = true;
shadow-radius = 8;
shadow-opacity = 0.6;
shadow-offset-x = 4;
shadow-offset-y = 4;
xinerama-shadow-crop = true;

shadow-exclude = [
    "class_g = 'slop'",
    "class_g = 'Plank'",
    "class_g = 'Tint2'",
    "class_g = 'Polybar'",
    "class_g = 'firefox'",
    "class_g = 'Google-chrome'",
    "class_g = 'Pcmanfm'",
    "class_g = 'Thunar'",
    "class_g = 'gimp'",
    "class_g = 'inkscape'",
#    "!window_type = 'menu'",
#    "!window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c",
];

# Fading

fading = false;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;
no-fading-destroyed-argb = true;
no-fading-openclose = false;

fade-exclude = [
    "!window_type = 'dropdown_menu'",
    "!window_type = 'tooltip'",
];

# Corners

corner-radius = 0;
rounded-corners-exclude = [
    "!window_type = 'normal'",
    "class_g = 'firefox'",
    "class_g = 'Google-chrome'",
    "class_g = 'Pcmanfm'",
    "class_g = 'Thunar'",
    "class_g = 'gimp'",
    "class_g = 'inkscape'",
];

# Blur

blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;
blur-kern = "11x11gaussian";
blur-method = "kernel";
blur-strength = 0;

blur-background-exclude = [
    "!window_type = 'normal'",
    "!window_type = 'splash'",
];

# General Settings

backend = "glx";
vsync = true;
#daemon = false;
dbus = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = false;
resize-damage = 1;
xrender-sync-fence = true;
glx-use-copysubbuffer-mesa = false;
no-ewmh-fullscreen = true;
#no-dock-shadow = true;

wintypes = {
    normal = { fade = false; full-shadow = true; };
    combo = { fade = false; };
    popup_menu = { fade = false; shadow = true; full-shadow = true; };
    notification = { fade = false; full-shadow = true; };
    dropdown_menu = { fade = false; full-shadow = true; };
    dock = { fade = false; full-shadow = false; clip-shadow-above = true; };
    menu = { fade = false; full-shadow = true; };
    tooltip = { fade = false; shadow = true; focus = false; full-shadow = true; };
    dnd = { fade = false; shadow = false; full-shadow = false; };
    unknown = { fade = false; shadow = true; };
    utility = { fade = false; shadow = true; };
    desktop = { fade = false; shadow = true; full-shadow = true; };
    toolbar = { fade = false; shadow = true; };
    splash = { fade = false; shadow = true; }
    dialog = { fade = false; shadow = true; };
};
